<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Manu's LinkedIn AI Coach</title>

<style>

body{
font-family: Arial;
background:#0f172a;
color:white;
margin:0;
padding:0;
}

.header{
background:#1e3a8a;
padding:15px;
font-size:20px;
font-weight:bold;
}

.container{
max-width:800px;
margin:auto;
padding:20px;
}

.chat-box{
background:#111827;
border-radius:10px;
padding:20px;
min-height:400px;
}

.message{
margin:10px 0;
}

.user{
color:#93c5fd;
}

.bot{
color:#facc15;
}

input{
width:80%;
padding:10px;
border-radius:6px;
border:none;
}

button{
padding:10px 15px;
border:none;
border-radius:6px;
background:#2563eb;
color:white;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.api-box{
margin-bottom:20px;
}

</style>

</head>

<body>

<div class="header">
Manu's LinkedIn AI Coach
</div>

<div class="container">

<div class="api-box">
<input id="apikey" placeholder="Enter Gemini API Key">
<button onclick="saveKey()">Save Key</button>
</div>

<div id="chat" class="chat-box"></div>

<br>

<input id="prompt" placeholder="Ask LinkedIn coach anything">
<button onclick="send()">Send</button>

</div>

<script>

const SYSTEM_PROMPT = "You are a LinkedIn growth coach. Help users write better posts.";

function saveKey(){

let key = document.getElementById("apikey").value

if(!key){
alert("Enter API key")
return
}

localStorage.setItem("gemini_key",key)

alert("API key saved")

}

function addMessage(role,text){

let chat=document.getElementById("chat")

let div=document.createElement("div")

div.className="message "+role

div.innerText=text

chat.appendChild(div)

chat.scrollTop=chat.scrollHeight

}

async function send(){

let text=document.getElementById("prompt").value

if(!text) return

addMessage("user","You: "+text)

document.getElementById("prompt").value=""

let key=localStorage.getItem("gemini_key")

if(!key){
alert("Please add API key first")
return
}

let url=`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`

let body={
contents:[
{
parts:[
{ text:SYSTEM_PROMPT+"\nUser:"+text }
]
}
]
}

try{

let res=await fetch(url,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(body)
})

let data=await res.json()

let reply=data.candidates[0].content.parts[0].text

addMessage("bot","AI: "+reply)

}catch(e){

addMessage("bot","Error calling API")

}

}

</script>

</body>
</html>
